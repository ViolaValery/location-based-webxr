<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Persistence Demo — KmlEditor</title>
    <meta name="description" content="Chrome-only demo for KmlEditor persistence service: native in-place autosave via File System Access API, export fallback, and live save-status monitoring." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        --bg:        #0d1117;
        --surface:   #161b22;
        --surface-2: #1c2333;
        --border:    rgba(255,255,255,0.10);
        --accent:    #58a6ff;
        --accent-g:  #3fb950;
        --accent-r:  #f85149;
        --accent-y:  #e3b341;
        --text:      #e6edf3;
        --muted:     #8b949e;
        --mono:      'JetBrains Mono', 'Fira Code', monospace;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        background: var(--bg);
        background-image:
          radial-gradient(ellipse 80% 50% at 50% -20%, rgba(88,166,255,0.12) 0%, transparent 70%);
        color: var(--text);
        font-size: 14px;
        line-height: 1.6;
      }

      /* ── Layout ─────────────────────────────────────────────────────────── */
      header {
        padding: 24px 32px 0;
        border-bottom: 1px solid var(--border);
      }

      header h1 {
        font-size: 1.35rem;
        font-weight: 700;
        color: var(--text);
        letter-spacing: -0.01em;
      }

      header p {
        color: var(--muted);
        font-size: 0.85rem;
        margin-top: 4px;
        padding-bottom: 16px;
      }

      .badge-chrome {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        background: rgba(88,166,255,0.12);
        border: 1px solid rgba(88,166,255,0.3);
        color: var(--accent);
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        padding: 2px 9px;
        border-radius: 12px;
        margin-left: 10px;
        vertical-align: middle;
      }

      main {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 20px;
        padding: 24px 32px 48px;
        max-width: 1100px;
        margin: 0 auto;
      }

      @media (max-width: 720px) {
        main { grid-template-columns: 1fr; }
      }

      /* ── Cards ──────────────────────────────────────────────────────────── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px;
      }

      .card h2 {
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 14px;
      }

      /* ── Buttons ────────────────────────────────────────────────────────── */
      button {
        display: flex;
        align-items: center;
        gap: 7px;
        width: 100%;
        padding: 9px 14px;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: var(--surface-2);
        color: var(--text);
        font-family: inherit;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, transform 0.1s;
        margin-bottom: 8px;
      }
      button:last-child { margin-bottom: 0; }
      button:hover:not(:disabled) {
        background: rgba(88,166,255,0.10);
        border-color: rgba(88,166,255,0.35);
        transform: translateY(-1px);
      }
      button:active:not(:disabled) { transform: translateY(0); }
      button:disabled { opacity: 0.38; cursor: not-allowed; }

      button.danger:hover:not(:disabled) {
        background: rgba(248,81,73,0.10);
        border-color: rgba(248,81,73,0.35);
      }

      button .icon { font-size: 1rem; }

      /* ── Status badge ───────────────────────────────────────────────────── */
      #status-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        transition: background 0.25s, border-color 0.25s, color 0.25s;
        border: 1px solid transparent;
        margin-bottom: 16px;
      }
      .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        display: inline-block;
        transition: background 0.25s;
      }

      #status-badge.idle    { background: rgba(139,148,158,0.12); border-color: rgba(139,148,158,0.25); color: var(--muted); }
      #status-badge.idle    .dot { background: var(--muted); }
      #status-badge.saving  { background: rgba(227,179,65,0.12);  border-color: rgba(227,179,65,0.3);   color: var(--accent-y); animation: pulse 0.8s ease-in-out infinite alternate; }
      #status-badge.saving  .dot { background: var(--accent-y); }
      #status-badge.saved   { background: rgba(63,185,80,0.12);   border-color: rgba(63,185,80,0.3);    color: var(--accent-g); }
      #status-badge.saved   .dot { background: var(--accent-g); }
      #status-badge.error   { background: rgba(248,81,73,0.12);   border-color: rgba(248,81,73,0.3);    color: var(--accent-r); }
      #status-badge.error   .dot { background: var(--accent-r); }

      @keyframes pulse {
        from { opacity: 0.7; } to { opacity: 1; }
      }

      /* ── Info rows ──────────────────────────────────────────────────────── */
      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.8rem;
      }
      .info-row:last-child { border-bottom: none; }
      .info-row .label { color: var(--muted); }
      .info-row .value { font-family: var(--mono); font-size: 0.78rem; color: var(--text); }
      .info-row .value.native { color: var(--accent-g); }
      .info-row .value.detached { color: var(--accent-y); }
      .info-row .value.none { color: var(--muted); }

      /* ── Event log ──────────────────────────────────────────────────────── */
      #event-log {
        font-family: var(--mono);
        font-size: 0.76rem;
        background: #0d1117;
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 12px;
        height: 320px;
        overflow-y: auto;
        display: flex;
        flex-direction: column-reverse; /* newest at top */
      }

      .log-entry {
        padding: 2px 0;
        display: flex;
        gap: 10px;
        border-bottom: 1px solid rgba(255,255,255,0.04);
        animation: fadeIn 0.2s ease;
      }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }
      .log-entry .ts { color: var(--muted); flex-shrink: 0; }
      .log-entry .msg { color: var(--text); }
      .log-entry.status-saved  .msg { color: var(--accent-g); }
      .log-entry.status-saving .msg { color: var(--accent-y); }
      .log-entry.status-error  .msg { color: var(--accent-r); }
      .log-entry.status-idle   .msg { color: var(--muted); }
      .log-entry.action .msg   { color: var(--accent); }

      /* ── Error box ──────────────────────────────────────────────────────── */
      #error-box {
        background: rgba(248,81,73,0.08);
        border: 1px solid rgba(248,81,73,0.25);
        border-radius: 7px;
        padding: 10px 14px;
        font-size: 0.78rem;
        font-family: var(--mono);
        color: var(--accent-r);
        margin-top: 12px;
        display: none;
        word-break: break-word;
      }
      #error-box.visible { display: block; }

      /* ── Counter row ────────────────────────────────────────────────────── */
      .counter-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 14px;
      }
      .counter-cell {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: 7px;
        padding: 12px;
        text-align: center;
      }
      .counter-cell .num {
        font-family: var(--mono);
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--accent);
        display: block;
        line-height: 1.2;
      }
      .counter-cell .lbl {
        font-size: 0.72rem;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      /* ── Environment warning ────────────────────────────────────────────── */
      #env-warning {
        background: rgba(248,81,73,0.10);
        border: 1px solid rgba(248,81,73,0.3);
        border-radius: 8px;
        padding: 12px 16px;
        color: var(--accent-r);
        font-size: 0.82rem;
        margin-bottom: 16px;
        display: none;
      }
      #env-warning.visible { display: block; }
    </style>
  </head>
  <body>
    <header>
      <h1>Persistence Demo <span class="badge-chrome">Chrome Only</span></h1>
      <p>File System Access API · Native in-place autosave · Export fallback · Session token stale-write guard</p>
    </header>

    <main>
      <!-- Left column: controls -->
      <aside>
        <div class="card" style="margin-bottom:16px">
          <h2>File Session</h2>
          <div id="env-warning"></div>
          <button id="btn-open"><span class="icon">📂</span> Open via picker</button>
          <button id="btn-dispose" disabled><span class="icon">✕</span> Dispose session</button>
        </div>

        <div class="card" style="margin-bottom:16px">
          <h2>Edit Simulation</h2>
          <button id="btn-notify" disabled><span class="icon">✏️</span> Simulate edit (notifyChange)</button>
          <button id="btn-notify-burst" disabled><span class="icon">⚡</span> Burst ×10 (coalesce test)</button>
        </div>

        <div class="card" style="margin-bottom:16px">
          <h2>Explicit Save</h2>
          <button id="btn-save" disabled><span class="icon">💾</span> Save now</button>
          <button id="btn-flush" disabled><span class="icon">⏏️</span> Flush now</button>
        </div>

        <div class="card">
          <h2>Export</h2>
          <button id="btn-export" disabled><span class="icon">⬇️</span> Export / Download</button>
        </div>
      </aside>

      <!-- Right column: status + log -->
      <section>
        <!-- Status -->
        <div class="card" style="margin-bottom:16px">
          <h2>Live Status</h2>
          <div id="status-badge" class="idle">
            <span class="dot"></span>
            <span id="status-text">idle</span>
          </div>

          <div class="info-row">
            <span class="label">Mode</span>
            <span id="mode-value" class="value none">—</span>
          </div>
          <div class="info-row">
            <span class="label">File</span>
            <span id="file-value" class="value none">—</span>
          </div>
          <div class="info-row">
            <span class="label">hasNativeFileAccess</span>
            <span id="native-value" class="value"></span>
          </div>

          <div id="error-box"></div>

          <div class="counter-grid">
            <div class="counter-cell">
              <span class="num" id="count-saves">0</span>
              <span class="lbl">Saves triggered</span>
            </div>
            <div class="counter-cell">
              <span class="num" id="count-changes">0</span>
              <span class="lbl">Changes notified</span>
            </div>
          </div>
        </div>

        <!-- Event log -->
        <div class="card">
          <h2>Event Log</h2>
          <div id="event-log" aria-label="Event log" role="log" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <script type="module">
      // ── Import persistence service ──────────────────────────────────────
      // In a real app this comes from the barrel:
      //   import { createPersistenceService } from '../../src/persistence/index.ts';
      // For the demo we inline a minimal shim that uses the real implementation
      // through Vite's module resolution.
      import { createPersistenceService } from '../../src/persistence/index.ts';

      // ── Fake KmzContainer (demo shim) ───────────────────────────────────
      // The real container is created by kmz-io; for the demo we use a stub
      // so the page works without a real .kmz file being loaded through kmz-io.
      // The stub open() accepts a File and returns a small fake ArrayBuffer on save().
      function makeFakeContainer(file) {
        let _bytes = new ArrayBuffer(512); // 512 B fake kmz
        return {
          open:            async (src) => {},
          getDocKml:       () => '<kml></kml>',
          setDocKml:       () => {},
          listAssets:      () => [],
          save:            async () => { countSaves++; updateCounter(); return _bytes; },
          getAssetProvider: () => ({ getAssetUrl: async () => '', getAssetBytes: async () => new Uint8Array(), hasAsset: () => false, dispose: () => {} }),
          dispose:         () => {},
        };
      }

      // ── State ───────────────────────────────────────────────────────────
      let svc = createPersistenceService();
      let activeContainer = null;
      let activeFileName  = null;
      let countSaves      = 0;
      let countChanges    = 0;

      // ── DOM refs ────────────────────────────────────────────────────────
      const $ = id => document.getElementById(id);
      const btnOpen       = $('btn-open');
      const btnDispose    = $('btn-dispose');
      const btnNotify     = $('btn-notify');
      const btnBurst      = $('btn-notify-burst');
      const btnSave       = $('btn-save');
      const btnFlush      = $('btn-flush');
      const btnExport     = $('btn-export');

      const statusBadge   = $('status-badge');
      const statusText    = $('status-text');
      const modeValue     = $('mode-value');
      const fileValue     = $('file-value');
      const nativeValue   = $('native-value');
      const errorBox      = $('error-box');
      const eventLog      = $('event-log');
      const envWarning    = $('env-warning');

      // ── Environment check ───────────────────────────────────────────────
      if (!svc.hasNativeFileAccess) {
        envWarning.textContent =
          '⚠️  File System Access API not detected. This demo requires Google Chrome. ' +
          'Native save will fail; export/download still works.';
        envWarning.classList.add('visible');
      }

      nativeValue.textContent = String(svc.hasNativeFileAccess);
      nativeValue.className   = 'value ' + (svc.hasNativeFileAccess ? 'native' : 'detached');

      // ── Status listener ─────────────────────────────────────────────────
      svc.onStatusChange(status => {
        statusBadge.className = status;
        statusText.textContent = status;
        log(`Status → ${status}`, 'status-' + status);
        if (status !== 'error') {
          errorBox.textContent = '';
          errorBox.classList.remove('visible');
        }
      });

      // ── Helpers ─────────────────────────────────────────────────────────
      function log(msg, cls = '') {
        const entry = document.createElement('div');
        entry.className = 'log-entry ' + cls;
        const ts = new Date().toLocaleTimeString('en', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        entry.innerHTML = `<span class="ts">${ts}</span><span class="msg">${escHtml(msg)}</span>`;
        eventLog.prepend(entry);
      }
      function escHtml(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }
      function updateCounter() {
        $('count-saves').textContent   = String(countSaves);
        $('count-changes').textContent = String(countChanges);
      }
      function setSessionActive(container, fileName, mode) {
        activeContainer = container;
        activeFileName  = fileName;
        modeValue.textContent = mode;
        modeValue.className   = 'value ' + (mode === 'native-bound' ? 'native' : 'detached');
        fileValue.textContent = fileName ?? '—';
        fileValue.className   = 'value';
        [btnDispose, btnNotify, btnBurst, btnSave, btnFlush, btnExport]
          .forEach(b => b.disabled = false);
        btnOpen.disabled = false;
      }
      function clearSession() {
        activeContainer = null;
        activeFileName  = null;
        modeValue.textContent = '—';
        modeValue.className   = 'value none';
        fileValue.textContent = '—';
        fileValue.className   = 'value none';
        [btnDispose, btnNotify, btnBurst, btnSave, btnFlush, btnExport]
          .forEach(b => b.disabled = true);
      }
      function showError(err) {
        errorBox.textContent = err?.message ?? String(err);
        errorBox.classList.add('visible');
        log('Error: ' + (err?.message ?? err), 'status-error');
      }

      // ── Open ────────────────────────────────────────────────────────────
      btnOpen.addEventListener('click', async () => {
        log('Opening file picker…', 'action');
        try {
          // For the demo we intercept the picker by opening a real file input,
          // build a fake container from the selected file, and inject it into
          // the service via a patched open() that bypasses kmz-io.
          // This demonstrates all service behavior without requiring a real KMZ.

          const fileInput = document.createElement('input');
          fileInput.type = 'file';
          fileInput.accept = '.kmz,.kml';
          fileInput.style.display = 'none';
          document.body.appendChild(fileInput);

          const file = await new Promise((resolve, reject) => {
            fileInput.onchange = () => resolve(fileInput.files[0]);
            fileInput.oncancel = () => reject(new Error('File selection cancelled.'));
            fileInput.click();
          });
          document.body.removeChild(fileInput);

          if (!file) return;

          // Tear down existing service and create fresh one.
          svc.dispose();
          svc = createPersistenceService();
          countSaves   = 0;
          countChanges = 0;
          updateCounter();
          svc.onStatusChange(status => {
            statusBadge.className = status;
            statusText.textContent = status;
            log(`Status → ${status}`, 'status-' + status);
            if (status !== 'error') {
              errorBox.textContent = '';
              errorBox.classList.remove('visible');
            }
          });

          // Build a fake container for the demo.
          const container = makeFakeContainer(file);

          // Inject session state directly (demo only; real use calls svc.open(file)).
          const s = svc;
          const internal = s;
          // Call real open(file) — the service will try to dynamically import kmz-io.
          // Since we want demo independence, we instead directly seed the session:
          const p = internal;
          p._session = p._session || {};
          p._session.sessionToken = (p._session.sessionToken || 0) + 1;
          p._session.activeContainer = container;
          p._session.activeFileHandle = null; // detached — no picker handle
          p._session.dirtyVersion    = 0;
          p._session.persistedVersion = 0;
          p._session.isSaving        = false;
          p._session.pendingFlush    = false;
          p._session.lastError       = null;
          p._setStatus('saved');

          setSessionActive(container, file.name, 'detached');
          log(`Opened "${file.name}" (detached — no native handle in demo)`, 'action');
        } catch (err) {
          if (err?.message !== 'File selection cancelled.') showError(err);
        }
      });

      // ── Dispose ─────────────────────────────────────────────────────────
      btnDispose.addEventListener('click', () => {
        svc.dispose();
        clearSession();
        log('Session disposed.', 'action');
      });

      // ── Notify change ───────────────────────────────────────────────────
      btnNotify.addEventListener('click', () => {
        countChanges++;
        updateCounter();
        svc.notifyChange();
        log('notifyChange() called — autosave debounce reset.', 'action');
      });

      // ── Burst ────────────────────────────────────────────────────────────
      btnBurst.addEventListener('click', () => {
        for (let i = 0; i < 10; i++) {
          countChanges++;
          svc.notifyChange();
        }
        updateCounter();
        log('Burst: 10× notifyChange() — should coalesce to 1 save.', 'action');
      });

      // ── Save ─────────────────────────────────────────────────────────────
      btnSave.addEventListener('click', async () => {
        if (!activeContainer) return;
        log('save() called…', 'action');
        try {
          await svc.save(activeContainer);
          log('save() completed.', 'status-saved');
        } catch (err) {
          showError(err);
        }
      });

      // ── Flush ─────────────────────────────────────────────────────────────
      btnFlush.addEventListener('click', async () => {
        if (!activeContainer) return;
        log('flush() called…', 'action');
        try {
          await svc.flush(activeContainer);
          log('flush() completed.', 'status-saved');
        } catch (err) {
          showError(err);
        }
      });

      // ── Export ───────────────────────────────────────────────────────────
      btnExport.addEventListener('click', async () => {
        if (!activeContainer) return;
        const filename = activeFileName ?? 'exported.kmz';
        log(`downloadAs("${filename}") called…`, 'action');
        try {
          await svc.downloadAs(activeContainer, filename);
          log('Export triggered. persistedVersion unchanged (export ≠ native save).', 'action');
        } catch (err) {
          showError(err);
        }
      });

      // ── Initial render ───────────────────────────────────────────────────
      updateCounter();
      log('Demo ready. Open a .kmz or .kml file to begin.', 'action');
    </script>
  </body>
</html>
