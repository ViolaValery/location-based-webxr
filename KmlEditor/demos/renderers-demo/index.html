<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KML Feature Renderers Standalone Demo</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Outfit, Inter, system-ui, -apple-system, sans-serif;
        --bg: #0d0e15;
        --panel: rgba(20, 21, 33, 0.85);
        --panel-accent: #1f2035;
        --accent: #6c5ce7;
        --accent-glow: rgba(108, 92, 231, 0.4);
        --text: #f3f4f6;
        --muted: #9ca3af;
        --border: rgba(255, 255, 255, 0.08);
        --danger: #ff7675;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      .layout {
        display: grid;
        grid-template-columns: 420px 1fr;
        width: 100%;
        height: 100%;
      }

      /* Sidebar styling */
      .sidebar {
        background: var(--panel);
        backdrop-filter: blur(16px);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding: 1.5rem;
        box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        z-index: 10;
      }

      h1 {
        font-size: 1.5rem;
        margin: 0 0 0.5rem 0;
        font-weight: 700;
        letter-spacing: -0.025em;
        background: linear-gradient(135deg, #fff 0%, var(--muted) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .subtitle {
        color: var(--muted);
        font-size: 0.85rem;
        margin-bottom: 2rem;
      }

      .section-title {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--accent);
        margin: 1.5rem 0 0.75rem 0;
        font-weight: 600;
      }

      /* Control groups */
      .card {
        background: var(--panel-accent);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem;
        margin-bottom: 1rem;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .card:hover {
        border-color: rgba(108, 92, 231, 0.3);
        box-shadow: 0 4px 20px rgba(108, 92, 231, 0.05);
      }

      .control-row {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 0.85rem;
      }

      .control-row:last-child {
        margin-bottom: 0;
      }

      label {
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--muted);
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .number-display {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .value-badge {
        background: rgba(108, 92, 231, 0.15);
        color: #a29bfe;
        font-size: 0.75rem;
        padding: 0.15rem 0.4rem;
        border-radius: 6px;
        font-family: monospace;
      }

      /* Interactive buttons */
      button {
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 0.6rem 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.1s, filter 0.2s;
        box-shadow: 0 4px 12px var(--accent-glow);
      }

      button:hover {
        filter: brightness(1.1);
      }

      button:active {
        transform: scale(0.98);
      }

      button.danger {
        background: var(--danger);
        box-shadow: 0 4px 12px rgba(255, 118, 117, 0.3);
      }

      .toggle-container {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      /* Viewport styling */
      .viewport-container {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #canvas-viewport {
        width: 100%;
        height: 100%;
        display: block;
      }

      .overlay-info {
        position: absolute;
        top: 1.5rem;
        right: 1.5rem;
        background: rgba(13, 14, 21, 0.75);
        border: 1px solid var(--border);
        backdrop-filter: blur(10px);
        border-radius: 8px;
        padding: 0.75rem 1rem;
        pointer-events: none;
      }

      .info-row {
        font-size: 0.8rem;
        display: flex;
        gap: 1rem;
        margin-bottom: 0.35rem;
      }

      .info-row:last-child {
        margin-bottom: 0;
      }

      .info-label {
        color: var(--muted);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <!-- Left sidebar panel for controls -->
      <aside class="sidebar">
        <h1>Feature Renderers</h1>
        <div class="subtitle">Standalone visual testing sandpit for KML layers</div>

        <!-- Marker controls -->
        <div class="section-title">Marker Feature</div>
        <div class="card">
          <div class="control-row">
            <div class="number-display">
              <label for="marker-scale">Scale multiplier</label>
              <span class="value-badge" id="val-marker-scale">1.0</span>
            </div>
            <input type="range" id="marker-scale" min="0.2" max="3" step="0.1" value="1.0" />
          </div>
          <div class="control-row">
            <label for="marker-alt">Altitude (m)</label>
            <input type="range" id="marker-alt" min="0" max="50" step="1" value="10" />
          </div>
        </div>

        <!-- Line controls -->
        <div class="section-title">Line Feature</div>
        <div class="card">
          <div class="control-row toggle-container">
            <input type="checkbox" id="line-handles" />
            <label for="line-handles">Show interactive vertex handles</label>
          </div>
          <div class="control-row" style="margin-top: 0.5rem;">
            <button id="btn-add-vertex">Add dynamic vertex</button>
          </div>
        </div>

        <!-- Ground overlay controls -->
        <div class="section-title">Ground Overlay</div>
        <div class="card">
          <div class="control-row">
            <div class="number-display">
              <label for="overlay-rotation">Overlay Rotation</label>
              <span class="value-badge" id="val-overlay-rotation">45°</span>
            </div>
            <input type="range" id="overlay-rotation" min="0" max="360" step="5" value="45" />
          </div>
          <div class="control-row">
            <div class="number-display">
              <label for="overlay-opacity">Overlay Opacity</label>
              <span class="value-badge" id="val-overlay-opacity">0.8</span>
            </div>
            <input type="range" id="overlay-opacity" min="0.1" max="1" step="0.05" value="0.8" />
          </div>
        </div>

        <!-- Model controls -->
        <div class="section-title">3D Model (COLLADA DAE)</div>
        <div class="card">
          <div class="control-row">
            <div class="number-display">
              <label for="model-yaw">Heading (Yaw)</label>
              <span class="value-badge" id="val-model-yaw">0°</span>
            </div>
            <input type="range" id="model-yaw" min="0" max="360" step="5" value="0" />
          </div>
          <div class="control-row">
            <div class="number-display">
              <label for="model-pitch">Tilt (Pitch)</label>
              <span class="value-badge" id="val-model-pitch">0°</span>
            </div>
            <input type="range" id="model-pitch" min="-90" max="90" step="5" value="0" />
          </div>
          <div class="control-row">
            <div class="number-display">
              <label for="model-scale">Scale multiplier</label>
              <span class="value-badge" id="val-model-scale">1.0</span>
            </div>
            <input type="range" id="model-scale" min="0.5" max="4" step="0.1" value="1.0" />
          </div>
          <div class="control-row" style="margin-top: 0.5rem; gap: 0.5rem; display: flex; flex-direction: row;">
            <button id="btn-trigger-model-load" style="flex: 1;">Reload Model</button>
            <button id="btn-trigger-model-error" class="danger" style="flex: 1;">Inject Load Error</button>
          </div>
        </div>
      </aside>

      <!-- Right viewport container -->
      <main class="viewport-container">
        <div id="canvas-viewport"></div>
        <div class="overlay-info">
          <div class="info-row">
            <span class="info-label">Active Scene Nodes:</span>
            <span id="txt-active-nodes">5</span>
          </div>
          <div class="info-row">
            <span class="info-label">FPS Target:</span>
            <span>60 FPS</span>
          </div>
          <div class="info-row">
            <span class="info-label">Status:</span>
            <span id="txt-renderer-status" style="color: #55efc4;">Healthy</span>
          </div>
        </div>
      </main>
    </div>

    <!-- Script bootstrapping the Three.js environment and renderers -->
    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
      import {
        RendererFactory,
        TexturePromiseCache
      } from '../../src/renderers/index.ts';

      // 1. Basic COLLADA DAE XML string defining a simple 3D cube model (self-contained asset)
      const mockCubeDae = `<?xml version="1.0" encoding="utf-8"?>
<COLLADA xmlns="http://www.collada.org/2005/11/COLLADASchema" version="1.4.1">
  <library_geometries>
    <geometry id="cube" name="cube">
      <mesh>
        <source id="positions">
          <float_array id="positions-array" count="24">
            -0.8 -0.8 -0.8   0.8 -0.8 -0.8   0.8  0.8 -0.8  -0.8  0.8 -0.8
            -0.8 -0.8  0.8   0.8 -0.8  0.8   0.8  0.8  0.8  -0.8  0.8  0.8
          </float_array>
          <technique_common>
            <accessor source="#positions-array" count="8" stride="3">
              <param name="X" type="float"/>
              <param name="Y" type="float"/>
              <param name="Z" type="float"/>
            </accessor>
          </technique_common>
        </source>
        <vertices id="vertices">
          <input semantic="POSITION" source="#positions"/>
        </vertices>
        <polylist count="6">
          <input semantic="VERTEX" source="#vertices" offset="0"/>
          <vcount>4 4 4 4 4 4</vcount>
          <p>
            0 3 2 1
            0 1 5 4
            1 2 6 5
            2 3 7 6
            3 0 4 7
            4 5 6 7
          </p>
        </polylist>
      </mesh>
    </geometry>
  </library_geometries>
  <library_visual_scenes>
    <visual_scene id="scene" name="scene">
      <node id="cube_node" name="cube_node">
        <instance_geometry url="#cube"/>
      </node>
    </visual_scene>
  </library_visual_scenes>
  <scene>
    <instance_visual_scene url="#scene"/>
  </scene>
</COLLADA>`;

      // 2. Setup mock coordinate bridge and asset providers
      class MockGeoBridge {
        setAnchor(anchor) {}
        geoToWorld(position, altitudeMode) {
          // Simple coordinate projection scaling degrees for local display
          const lonScale = 1000;
          const latScale = 1000;
          return new THREE.Vector3(
            (position.lon - 6.06) * lonScale,
            position.alt || 0,
            (position.lat - 50.77) * latScale
          );
        }
        worldToGeo(position, altitudeMode) {
          return {
            lon: position.x / 1000 + 6.06,
            lat: position.z / 1000 + 50.77,
            alt: position.y
          };
        }
        formatCoordinate(value) {
          return value.toFixed(6);
        }
      }

      class MockAssetProvider {
        constructor() {
          this.shouldFail = false;
        }
        async getAssetUrl(href) {
          if (this.shouldFail) throw new Error("Injected asset loading failure");
          
          // Generate textures dynamically using canvasses
          const canvas = document.createElement('canvas');
          canvas.width = 64;
          canvas.height = 64;
          const ctx = canvas.getContext('2d');
          
          if (href.includes('icon.png')) {
            ctx.fillStyle = '#6c5ce7';
            ctx.beginPath();
            ctx.arc(32, 32, 24, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.stroke();
          } else {
            // Checkerboard for overlay texture
            ctx.fillStyle = '#1e272e';
            ctx.fillRect(0, 0, 64, 64);
            ctx.fillStyle = '#0be881';
            ctx.fillRect(0, 0, 32, 32);
            ctx.fillRect(32, 32, 32, 32);
          }
          
          return new Promise(res => {
            canvas.toBlob(blob => {
              res(URL.createObjectURL(blob));
            });
          });
        }

        async getAssetBytes(href) {
          if (this.shouldFail) throw new Error("Injected asset loading failure");
          return new TextEncoder().encode(mockCubeDae);
        }

        hasAsset(href) {
          return true;
        }
        dispose() {}
      }

      // 3. Setup Three.js environment
      const containerElement = document.getElementById('canvas-viewport');
      const scene = new THREE.Scene();
      scene.background = new THREE.Color('#0d0e15');

      const camera = new THREE.PerspectiveCamera(
        45,
        containerElement.clientWidth / containerElement.clientHeight,
        0.1,
        1000
      );
      camera.position.set(0, 25, 35);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(containerElement.clientWidth, containerElement.clientHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      containerElement.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.maxPolarAngle = Math.PI / 2 - 0.05; // Lock camera from going below ground

      // Lighting & helpers
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(20, 40, 20);
      scene.add(dirLight);

      const gridHelper = new THREE.GridHelper(50, 50, 0x6c5ce7, 0x2f3542);
      scene.add(gridHelper);

      // 4. Initialize renderers
      const factory = new RendererFactory();
      const geoBridge = new MockGeoBridge();
      const assetProvider = new MockAssetProvider();

      // Feature instances data representing the 4 types
      const markerFeature = {
        id: 'feat-marker'		,
        type: 'marker',
        name: 'Anchor Point',
        description: 'Point marker description',
        position: { lon: 6.060, lat: 50.770, alt: 10 },
        iconHref: 'assets/icon.png',
        iconScale: 1.5
      };

      const lineFeature = {
        id: 'feat-line'		,
        type: 'line',
        name: 'Boundaries',
        description: 'Line path boundaries',
        coordinates: [
          { lon: 6.052, lat: 50.762, alt: 0 },
          { lon: 6.055, lat: 50.775, alt: 0 },
          { lon: 6.068, lat: 50.772, alt: 0 },
          { lon: 6.062, lat: 50.758, alt: 0 }
        ]
      };

      const overlayFeature = {
        id: 'feat-overlay'		,
        type: 'ground-overlay',
        name: 'Floor Plan',
        description: 'Ground map layout',
        imageHref: 'assets/overlay.png',
        latLonBox: {
          north: 50.778,
          south: 50.762,
          east: 6.068,
          west: 6.052,
          rotation: 45
        },
        altitude: 0.1,
        altitudeMode: 'relativeToGround'
      };

      const modelFeature = {
        id: 'feat-model'		,
        type: 'model',
        name: 'COLLADA Block',
        description: 'COLLADA 3D building structure',
        location: { lon: 6.060, lat: 50.770, alt: 0.5 },
        orientation: { heading: 0, tilt: 0, roll: 0 },
        scale: { x: 3, y: 3, z: 3 },
        modelHref: 'models/house.dae',
        altitudeMode: 'absolute'
      };

      const renderersList = [
        factory.createRenderer('marker'),
        factory.createRenderer('line'),
        factory.createRenderer('ground-overlay'),
        factory.createRenderer('model')
      ];

      // Add to scene graph
      renderersList.forEach(r => {
        scene.add(r.getNativeObject());
      });

      // Update features with initial state
      async function updateAll() {
        try {
          await renderersList[0].update(markerFeature, assetProvider, geoBridge);
          await renderersList[1].update(lineFeature, assetProvider, geoBridge);
          await renderersList[2].update(overlayFeature, assetProvider, geoBridge);
          await renderersList[3].update(modelFeature, assetProvider, geoBridge);
          document.getElementById('txt-renderer-status').textContent = "Healthy";
          document.getElementById('txt-renderer-status').style.color = "#55efc4";
        } catch (e) {
          console.error(e);
          document.getElementById('txt-renderer-status').textContent = "Degraded";
          document.getElementById('txt-renderer-status').style.color = "var(--danger)";
        }
      }

      // Initial draw
      updateAll();

      // 5. Setup UI listeners
      // Marker scale
      document.getElementById('marker-scale').addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        document.getElementById('val-marker-scale').textContent = val.toFixed(1);
        markerFeature.iconScale = val;
        renderersList[0].update(markerFeature, assetProvider, geoBridge);
      });

      // Marker altitude
      document.getElementById('marker-alt').addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        markerFeature.position.alt = val;
        renderersList[0].update(markerFeature, assetProvider, geoBridge);
      });

      // Line edit handles
      document.getElementById('line-handles').addEventListener('change', (e) => {
        renderersList[1].setSelection(e.target.checked);
      });

      // Add dynamic vertex
      document.getElementById('btn-add-vertex').addEventListener('click', () => {
        const randomOffsetLon = (Math.random() - 0.5) * 0.01;
        const randomOffsetLat = (Math.random() - 0.5) * 0.01;
        lineFeature.coordinates.push({
          lon: 6.060 + randomOffsetLon,
          lat: 50.770 + randomOffsetLat,
          alt: 0
        });
        renderersList[1].update(lineFeature, assetProvider, geoBridge);
      });

      // Overlay rotation
      document.getElementById('overlay-rotation').addEventListener('input', (e) => {
        const val = parseInt(e.target.value);
        document.getElementById('val-overlay-rotation').textContent = `${val}°`;
        overlayFeature.latLonBox.rotation = val;
        renderersList[2].update(overlayFeature, assetProvider, geoBridge);
      });

      // Overlay opacity
      document.getElementById('overlay-opacity').addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        document.getElementById('val-overlay-opacity').textContent = val.toFixed(2);
        const mesh = renderersList[2].getNativeObject().children[0];
        if (mesh) {
          mesh.material.opacity = val;
        }
      });

      // Model yaw (Heading)
      document.getElementById('model-yaw').addEventListener('input', (e) => {
        const val = parseInt(e.target.value);
        document.getElementById('val-model-yaw').textContent = `${val}°`;
        modelFeature.orientation.heading = val;
        renderersList[3].update(modelFeature, assetProvider, geoBridge);
      });

      // Model pitch (Tilt)
      document.getElementById('model-pitch').addEventListener('input', (e) => {
        const val = parseInt(e.target.value);
        document.getElementById('val-model-pitch').textContent = `${val}°`;
        modelFeature.orientation.tilt = val;
        renderersList[3].update(modelFeature, assetProvider, geoBridge);
      });

      // Model scale
      document.getElementById('model-scale').addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        document.getElementById('val-model-scale').textContent = val.toFixed(1);
        modelFeature.scale = { x: val * 3, y: val * 3, z: val * 3 };
        renderersList[3].update(modelFeature, assetProvider, geoBridge);
      });

      // Reload model normally
      document.getElementById('btn-trigger-model-load').addEventListener('click', () => {
        assetProvider.shouldFail = false;
        renderersList[3].update(modelFeature, assetProvider, geoBridge);
      });

      // Trigger error fallback
      document.getElementById('btn-trigger-model-error').addEventListener('click', () => {
        assetProvider.shouldFail = true;
        renderersList[3].update(modelFeature, assetProvider, geoBridge);
      });

      // Handle window resizing
      window.addEventListener('resize', () => {
        camera.aspect = containerElement.clientWidth / containerElement.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(containerElement.clientWidth, containerElement.clientHeight);
      });

      // Animation loop
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();
    </script>
  </body>
</html>
